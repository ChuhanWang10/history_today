<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Today</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Codystar:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch color theme">
        Color: Olive Glow
      </button>

      <header class="app-header">
        <span class="sr-only">History Today</span>
        <h1 id="app-title" class="app-title">History Today</h1>
      </header>

      <section class="history-card" aria-label="Historical event">
        <p class="date-label" id="date-label">Loading today...</p>
        <p class="status-message" id="status-message" role="status" aria-live="polite">
          Loading historical events...
        </p>
        <p class="speech-support-message" id="speech-support-message" hidden>
          Browser voice fallback is not supported in this browser.
        </p>

        <article class="event-panel" aria-labelledby="event-year">
          <p class="year-label">Year</p>
          <h2 id="event-year">----</h2>
          <p id="event-text" class="event-text">
            Fetching a story from history.
          </p>
          <a id="source-link" class="source-link" href="#" target="_blank" rel="noopener noreferrer" hidden>
            Read on Wikipedia
          </a>
        </article>

        <form class="controls" aria-label="Event controls">
          <label class="style-field" for="speech-style">
            <span>Style</span>
            <select id="speech-style" name="speech-style">
              <option value="Normal">Normal</option>
              <option value="Dramatic">Dramatic</option>
              <option value="Breaking News">Breaking News</option>
              <option value="Bedtime Story">Bedtime Story</option>
              <option value="Movie Trailer">Movie Trailer</option>
            </select>
          </label>

          <div class="button-row">
            <button type="button" id="next-button">Next Event</button>
            <button type="button" id="speak-button">Speak</button>
            <button type="button" id="stop-button">Stop</button>
          </div>

          <button type="button" id="fallback-button" class="fallback-button" hidden>
            Use browser voice instead
          </button>
        </form>
      </section>
    </main>

    <footer class="app-footer">
      Historical data from Wikipedia.
    </footer>
  </body>
</html>
